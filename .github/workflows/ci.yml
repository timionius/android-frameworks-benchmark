name: CI 

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main ]

jobs:
  lint:
    name: Run Kotlin and C++ Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 1. Check Kotlin Formatting (Faster, fail early)
      - name: Run Ktlint
        run: ./gradlew ktlintCheck

      # 2. Run Android Lint (Static Analysis)
      - name: Run Android Lint
        run: ./gradlew lintDebug

      # 3. Build & Run C++ Clang-Tidy
      # This runs because we added -DCMAKE_CXX_CLANG_TIDY to build.gradle.kts
      - name: Run C++ Clang-Tidy
        run: ./gradlew :pixelsampler:assembleDebug
